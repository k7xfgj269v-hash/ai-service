<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI-Assistent · Ludwig Xu Consulting</title>
<style>
/* Schriftart aus dem System — kein externer Google-Fonts-Abruf (DSGVO/lokale Verarbeitung) */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar: #f7f7f8;
  --sidebar-border: #e5e5e5;
  --bg: #ffffff;
  --text: #1a1a1a;
  --text-muted: #8c8c8c;
  --text-light: #b0b0b0;
  --accent: #4b6ef5;
  --accent-light: #eef1fe;
  --border: #e8e8e8;
  --user-bg: #4b6ef5;
  --bot-bg: #f4f4f5;
  --hover: #efefef;
  --radius: 12px;
}

html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }

body {
  display: flex;
  height: 100vh;
  overflow: hidden;
  color: var(--text);
  background: var(--bg);
}

/* Sidebar */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--sidebar-border);
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  margin-bottom: 16px;
}

.sidebar-logo-icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sidebar-logo-icon svg {
  width: 16px;
  height: 16px;
  color: white;
}

.sidebar-logo-text {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.new-chat-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 9px 14px;
  border: 1px solid var(--sidebar-border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s;
  margin-bottom: 20px;
}

.new-chat-btn:hover { background: var(--hover); }

.new-chat-btn svg { width: 15px; height: 15px; color: var(--text-muted); }

.sidebar-section-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-light);
  padding: 0 8px;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.chat-item {
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background .15s;
}

.chat-item:hover { background: var(--hover); color: var(--text); }
.chat-item.active { background: var(--hover); color: var(--text); }

.sidebar-footer {
  margin-top: auto;
  border-top: 1px solid var(--sidebar-border);
  padding-top: 12px;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
}

.user-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: white;
  flex-shrink: 0;
}

.user-name { font-size: 13px; font-weight: 500; }
.user-plan { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.empty-logo {
  width: 48px;
  height: 48px;
  background: var(--accent);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.empty-logo svg { width: 26px; height: 26px; color: white; }

.empty-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.empty-sub {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 32px;
}

.suggestion-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 640px;
}

.suggestion {
  padding: 9px 16px;
  border: 1px solid var(--border);
  border-radius: 99px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.suggestion:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}

/* Chat messages */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 32px 20px;
  display: none;
}

.chat-area.visible { display: block; }

.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 4px; }

.msg-wrap {
  max-width: 720px;
  margin: 0 auto 28px;
}

.msg-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
}

.msg-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}

.msg-wrap.bot .msg-avatar { background: var(--accent); color: white; }
.msg-wrap.user .msg-avatar { background: #e8e8e8; color: var(--text-muted); }

.bubble {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text);
  padding-left: 36px;
  white-space: pre-wrap;
  word-break: break-word;
}

.msg-wrap.user .bubble { color: var(--text); }

/* Markdown im Bot-Text */
.bubble code.inline { background: #ececef; border-radius: 4px; padding: 1px 5px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .9em; }
.bubble .md-pre { background: #f4f4f5; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin: 6px 0; overflow-x: auto; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; line-height: 1.5; white-space: pre; }
.bubble strong { font-weight: 600; }
.bubble a { color: var(--accent); text-decoration: none; }
.bubble a:hover { text-decoration: underline; }
.bubble .md-h { font-weight: 600; margin: 4px 0 2px; }
.bubble .md-li { padding-left: 2px; }
.bubble .katex-display { margin: 8px 0; overflow-x: auto; overflow-y: hidden; padding: 2px 0; }
.bubble .katex { font-size: 1.05em; }

.typing-dots {
  display: inline-flex;
  gap: 4px;
  align-items: center;
  padding: 2px 0;
}

.typing-dots span {
  width: 5px;
  height: 5px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* Input */
.input-area {
  flex-shrink: 0;
  padding: 0 20px 20px;
}

.input-box {
  max-width: 720px;
  margin: 0 auto;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--bg);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: border-color .2s, box-shadow .2s;
  overflow: hidden;
}

.input-box:focus-within {
  border-color: #c5cef8;
  box-shadow: 0 2px 16px rgba(75,110,245,0.12);
}

.input-top {
  padding: 14px 16px 0;
}

textarea {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  resize: none;
  height: 28px;
  max-height: 160px;
  line-height: 1.6;
}

textarea::placeholder { color: var(--text-light); }

.input-bottom {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 8px 12px 12px;
  gap: 8px;
}

.dsgvo-tag {
  font-size: 11px;
  color: var(--text-light);
  margin-right: auto;
  display: flex;
  align-items: center;
  gap: 5px;
}

.dsgvo-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #22c55e;
}

.send-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .1s;
  flex-shrink: 0;
}

.send-btn:hover:not(:disabled) { background: #3a5de0; }
.send-btn:active:not(:disabled) { transform: scale(0.92); }
.send-btn:disabled { background: #d0d5f5; cursor: not-allowed; }
.send-btn svg { width: 15px; height: 15px; }

.input-hint {
  max-width: 720px;
  margin: 8px auto 0;
  font-size: 11px;
  color: var(--text-light);
  text-align: center;
}
</style>
<!-- KaTeX selbst gehostet (kein CDN) — Formel-Rendering ohne externe Anfragen -->
<link rel="stylesheet" href="katex/katex.min.css">
<script src="katex/katex.min.js"></script>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="sidebar-logo-text">KI-Assistent</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Neues Gespräch
  </button>

  <div id="history"></div>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">LX</div>
      <div>
        <div class="user-name">Ludwig Xu</div>
        <div class="user-plan">Ludwig Xu Consulting</div>
      </div>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="empty-state" id="emptyState">
    <div class="empty-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="empty-title">Wie kann ich Ihnen helfen?</div>
    <div class="empty-sub">Lokal · DSGVO-konform · Keine Datenweitergabe</div>
    <div class="suggestion-row">
      <div class="suggestion" onclick="useSuggestion(this)">Dokument zusammenfassen</div>
      <div class="suggestion" onclick="useSuggestion(this)">E-Mail formulieren</div>
      <div class="suggestion" onclick="useSuggestion(this)">Daten analysieren</div>
      <div class="suggestion" onclick="useSuggestion(this)">Frage zur Wissensdatenbank</div>
    </div>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <div class="input-box">
      <div class="input-top">
        <textarea id="inp" placeholder="Nachricht eingeben..." rows="1"></textarea>
      </div>
      <div class="input-bottom">
        <span class="dsgvo-tag">
          <span class="dsgvo-dot"></span>
          Lokale Verarbeitung
        </span>
        <button class="send-btn" id="btn" onclick="send()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
    <p class="input-hint">Enter senden · Shift+Enter neue Zeile</p>
  </div>
</div>

<script>
const inp = document.getElementById('inp');
const btn = document.getElementById('btn');
const chatArea = document.getElementById('chatArea');
const emptyState = document.getElementById('emptyState');
const historyEl = document.getElementById('history');

// ---- Sitzungen: jede Konversation hat eine eigene id (= userId zum Backend -> getrennter Kontext) ----
const SKEY = 'ki_sessions', CKEY = 'ki_current';
let sessions = [];
let currentId = null;
try { sessions = JSON.parse(localStorage.getItem(SKEY) || '[]'); } catch (e) { sessions = []; }
currentId = localStorage.getItem(CKEY) || null;

function genId() { return 'web-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7); }
function save() {
  try {
    localStorage.setItem(SKEY, JSON.stringify(sessions.slice(-50)));
    localStorage.setItem(CKEY, currentId || '');
  } catch (e) {}
}
function currentSession() { return sessions.find(s => s.id === currentId) || null; }

// ---- Sicheres Markdown + KaTeX (erst escapen, dann Whitelist; Formeln/Code vorab geschuetzt) ----
// Platzhalter @@KEEPn@@ schuetzt Code/Formeln vor der Markdown-Phase (kommt in echtem Text nicht vor)
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function katexRender(tex, display) {
  try { return window.katex ? katex.renderToString(tex, { displayMode: display, throwOnError: false }) : esc(tex); }
  catch (e) { return esc(tex); }
}
function renderMarkdown(raw) {
  const stash = [];
  const keep = html => { stash.push(html); return '@@KEEP' + (stash.length - 1) + '@@'; };
  let s = String(raw);
  // 1. Codebloecke und Formeln vor der Markdown-/Escape-Phase schuetzen
  s = s.replace(/```([\s\S]*?)```/g, (_, code) => keep('<pre class="md-pre">' + esc(code.replace(/^\n/, '')) + '</pre>'));
  s = s.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => keep(katexRender(tex.trim(), true)));
  s = s.replace(/\\\[([\s\S]+?)\\\]/g, (_, tex) => keep(katexRender(tex.trim(), true)));
  s = s.replace(/\\\(([\s\S]+?)\\\)/g, (_, tex) => keep(katexRender(tex.trim(), false)));
  // 2. Rest escapen, dann Inline-Markdown
  s = esc(s);
  s = s.replace(/`([^`\n]+)`/g, '<code class="inline">$1</code>');
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  // 3. Ueberschriften und Listen zeilenweise
  const out = s.split('\n').map(line => {
    const h = line.match(/^(#{1,4})\s+(.*)$/); if (h) return '<div class="md-h">' + h[2] + '</div>';
    const li = line.match(/^\s*[-*]\s+(.*)$/); if (li) return '<div class="md-li">• ' + li[1] + '</div>';
    const ol = line.match(/^\s*(\d+)\.\s+(.*)$/); if (ol) return '<div class="md-li">' + ol[1] + '. ' + ol[2] + '</div>';
    if (line.trim() === '') return '';
    return '<div>' + line + '</div>';
  }).join('');
  // 4. geschuetzte Bloecke zuruecksetzen
  return out.replace(/@@KEEP(\d+)@@/g, (_, i) => stash[+i]);
}

function addMsg(role, content) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;
  const header = document.createElement('div');
  header.className = 'msg-header';
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'user' ? 'Sie' : 'KI';
  const name = document.createElement('span');
  name.textContent = role === 'user' ? 'Sie' : 'KI-Assistent';
  header.appendChild(av);
  header.appendChild(name);
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (content === 'typing') {
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  } else if (role === 'bot') {
    bubble.innerHTML = renderMarkdown(content);
  } else {
    bubble.textContent = content;
  }
  wrap.appendChild(header);
  wrap.appendChild(bubble);
  chatArea.appendChild(wrap);
  chatArea.scrollTop = chatArea.scrollHeight;
  return wrap;
}

function showChat() { emptyState.style.display = 'none'; chatArea.classList.add('visible'); }
function showEmpty() { emptyState.style.display = ''; chatArea.classList.remove('visible'); chatArea.innerHTML = ''; }

function renderMessages() {
  const s = currentSession();
  chatArea.innerHTML = '';
  if (!s || s.messages.length === 0) { showEmpty(); return; }
  showChat();
  s.messages.forEach(m => addMsg(m.role, m.content));
}

function renderSidebar() {
  historyEl.innerHTML = '';
  if (!sessions.length) return;
  const label = document.createElement('div');
  label.className = 'sidebar-section-label';
  label.textContent = 'Verlauf';
  historyEl.appendChild(label);
  // neueste zuerst, anklickbar zum Wechseln
  [...sessions].reverse().forEach(s => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (s.id === currentId ? ' active' : '');
    item.textContent = s.title || 'Neues Gespraech';
    item.title = s.title || '';
    item.onclick = () => selectSession(s.id);
    historyEl.appendChild(item);
  });
}

function selectSession(id) {
  currentId = id; save();
  renderMessages(); renderSidebar(); inp.focus();
}

function newChat() {
  // bereits vorhandene leere Sitzung wiederverwenden statt anzuhaeufen
  const empty = sessions.find(s => s.messages.length === 0);
  if (empty) { currentId = empty.id; }
  else { const s = { id: genId(), title: 'Neues Gespraech', messages: [] }; sessions.push(s); currentId = s.id; }
  save(); renderMessages(); renderSidebar(); inp.focus();
}

function useSuggestion(el) { inp.value = el.textContent; inp.focus(); autoResize(); }

async function send() {
  const t = inp.value.trim();
  if (!t) return;
  inp.value = ''; inp.style.height = '28px'; btn.disabled = true;

  let s = currentSession();
  if (!s) { s = { id: genId(), title: 'Neues Gespraech', messages: [] }; sessions.push(s); currentId = s.id; }
  if (s.messages.length === 0) s.title = t.slice(0, 30) + (t.length > 30 ? '…' : '');
  s.messages.push({ role: 'user', content: t }); save();

  showChat();
  addMsg('user', t);
  renderSidebar();
  const tipEl = addMsg('bot', 'typing');

  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: t, userId: s.id })
    });
    const d = await r.json();
    tipEl.remove();
    const reply = d.reply || 'Entschuldigung, ich konnte keine Antwort generieren.';
    addMsg('bot', reply);
    s.messages.push({ role: 'bot', content: reply }); save();
  } catch (e) {
    tipEl.remove();
    addMsg('bot', 'Netzwerkfehler. Bitte versuchen Sie es erneut.');
  }
  btn.disabled = false; inp.focus();
}

function autoResize() { inp.style.height = '28px'; inp.style.height = Math.min(inp.scrollHeight, 160) + 'px'; }
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
inp.addEventListener('input', autoResize);

// Initialzustand wiederherstellen
if (!currentSession() && sessions.length) currentId = sessions[sessions.length - 1].id;
renderSidebar();
renderMessages();
inp.focus();
</script>
</body>
</html>
