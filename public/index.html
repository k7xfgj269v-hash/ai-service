<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;display:flex;flex-direction:column}
header{background:#fff;padding:14px 20px;border-bottom:1px solid #e5e5e5;text-align:center;font-size:17px;font-weight:600;color:#333;flex-shrink:0}
.chat{flex:1;overflow-y:auto;padding:20px 16px}
.chat .msg{display:flex;gap:10px;margin-bottom:18px;max-width:720px;margin-left:auto;margin-right:auto}
.chat .msg.user{flex-direction:row-reverse}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0}
.msg.bot .avatar{background:#4b9d2a}
.msg.user .avatar{background:#5c6bc0}
.bubble{max-width:72%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.7;word-break:break-word;white-space:pre-wrap}
.msg.bot .bubble{background:#fff;color:#333;border:1px solid #e8e8e8;border-top-left-radius:4px}
.msg.user .bubble{background:#4b9d2a;color:#fff;border-top-right-radius:4px}
.typing{opacity:.5;font-style:italic}
.input-bar{flex-shrink:0;background:#fff;border-top:1px solid #e5e5e5;padding:12px 16px;display:flex;gap:10px;max-width:720px;width:100%;margin:0 auto}
.input-bar textarea{flex:1;border:1px solid #ddd;border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;resize:none;outline:none;height:42px;max-height:110px;line-height:22px}
.input-bar textarea:focus{border-color:#4b9d2a}
.input-bar button{width:42px;height:42px;border:none;border-radius:50%;background:#4b9d2a;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.input-bar button:disabled{background:#b5d6a0;cursor:not-allowed}
.input-bar button:hover:not(:disabled){background:#3d8523}
.input-bar button svg{width:20px;height:20px}
</style>
</head>
<body>
<header>AI 助手</header>
<div class="chat" id="chat">
  <div class="msg bot">
    <div class="avatar">AI</div>
    <div class="bubble">你好，有什么可以帮你的？</div>
  </div>
</div>
<div class="input-bar">
  <textarea id="inp" placeholder="输入消息..." rows="1"></textarea>
  <button id="btn" onclick="send()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('inp'),btn=document.getElementById('btn');
const uid='web-'+Math.random().toString(36).slice(2,10);

function addMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML='<div class="avatar">'+(role==='user'?'我':'AI')+'</div><div class="bubble"></div>';
  d.querySelector('.bubble').textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
  return d;
}

async function send(){
  const t=inp.value.trim();
  if(!t)return;
  inp.value='';inp.style.height='42px';
  btn.disabled=true;
  addMsg('user',t);
  const tip=addMsg('bot','思考中...');
  tip.querySelector('.bubble').classList.add('typing');
  try{
    const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,userId:uid})});
    const d=await r.json();
    tip.remove();
    addMsg('bot',d.reply||'抱歉，暂时无法回复。');
  }catch(e){
    tip.remove();
    addMsg('bot','网络错误，请稍后重试。');
  }
  btn.disabled=false;inp.focus();
}

inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
inp.addEventListener('input',function(){this.style.height='42px';this.style.height=Math.min(this.scrollHeight,110)+'px'});
</script>
</body>
</html>
